general {
    hide_cursor = true
    ignore_empty_input = true
}

auth {
    pam {
        enabled = true
    }
}

background {
    monitor =
    color = rgba(20, 20, 20, 1.0)
}

input-field {
    monitor =
    size = 300, 50
    outline_thickness = 2
    outer_color = rgba(255, 255, 255, 0.3)
    inner_color = rgba(0, 0, 0, 0.5)
    font_color = rgba(255, 255, 255, 1.0)
    placeholder_text = Password
    halign = center
    valign = center
    position = 0, -80
}

label {
    monitor =
    text = $TIME
    color = rgba(200, 200, 200, 1.0)
    font_size = 64
    font_family = Sans
    halign = center
    valign = center
    position = 0, 80
}
